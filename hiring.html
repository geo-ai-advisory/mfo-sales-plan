<!DOCTYPE html>
<html lang="ru"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Команда продаж · Insapp МФО</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f5f6fa;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.lock{background:#fff;border:1px solid #e0e0e0;border-radius:16px;box-shadow:0 4px 24px rgba(0,0,0,.08);padding:40px 36px;max-width:380px;width:100%;text-align:center}
.lock h1{font-size:20px;color:#2d3436;margin-bottom:8px;font-weight:700}
.lock p{font-size:14px;color:#636e72;margin-bottom:24px}
.lock input{width:100%;padding:13px 16px;font-size:16px;background:#f8f9fa;border:1.5px solid #dfe6e9;border-radius:10px;color:#2d3436;margin-bottom:14px;transition:border-color .15s;outline:none}
.lock input:focus{border-color:#0984e3}
.lock button{width:100%;padding:13px;font-size:16px;font-weight:600;background:#0984e3;color:#fff;border:none;border-radius:10px;cursor:pointer;transition:all .15s}
.lock button:hover{background:#0770c2;box-shadow:0 4px 12px rgba(9,132,227,.3);transform:translateY(-1px)}
.lock button:active{background:#065a9c;transform:translateY(1px);box-shadow:inset 0 2px 6px rgba(0,0,0,.2)}
.err{color:#d63031;font-size:13px;margin-top:12px;min-height:18px}
</style></head>
<body>
<div class="lock">
  <h1>Insapp · план МФО</h1>
  <p>Документ защищён паролем</p>
  <input type="password" id="pw" placeholder="Пароль" autofocus autocomplete="current-password">
  <button id="go">Открыть</button>
  <div class="err" id="err"></div>
</div>

function b64(s){return Uint8Array.from(atob(s),c=>c.charCodeAt(0))}
async function decrypt(pw){
  const enc=new TextEncoder();
  const km=await crypto.subtle.importKey("raw",enc.encode(pw),"PBKDF2",false,["deriveKey"]);
  const key=await crypto.subtle.deriveKey({name:"PBKDF2",salt:b64(SALT),iterations:100000,hash:"SHA-256"},km,{name:"AES-GCM",length:256},false,["decrypt"]);
  const pt=await crypto.subtle.decrypt({name:"AES-GCM",iv:b64(IV)},key,b64(CT));
  return new TextDecoder().decode(pt);
}
function render(html){document.open();document.write(html);document.close();}
async function tryOpen(pw){
  try{const html=await decrypt(pw);render(html);}
  catch(e){document.getElementById("err").textContent="Неверный пароль";}
}
document.getElementById("go").onclick=()=>tryOpen(document.getElementById("pw").value);
document.getElementById("pw").addEventListener("keydown",e=>{if(e.key==="Enter")tryOpen(document.getElementById("pw").value);});
